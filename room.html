<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealMate Room - Active Motion</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/DragControls.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/utils/SkeletonUtils.js"></script>
  <style>
    body {
      margin: 0;
      background: #eef1f5;
      overflow: hidden;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: stretch;
      min-height: 100vh;
    }
    .phone-container {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: #000;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
    }
    #canvas-container { width: 100%; height: 100%; position: relative; }
    #webcam {
      position: absolute; bottom: 14px; right: 14px; width: 130px;
      border-radius: 12px; transform: scaleX(-1); border: 2px solid #1a73e8; z-index: 10;
      background: #111;
    }
    #loading {
      position: absolute; inset: 0; background: #0b0f1a;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; z-index: 1000; text-align: center; padding: 20px;
    }
    #my-avatar-badge {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.88);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.35);
      pointer-events: none;
      z-index: 12;
      display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="phone-container">
  <div id="loading">
    <h3 id="status">시스템 엔진 가동 중...</h3>
  </div>

  <div id="canvas-container">
    <video id="webcam" autoplay playsinline muted></video>
    <div id="my-avatar-badge">내 아바타</div>
  </div>
</div>

<script type="module">
  import { FaceLandmarker, PoseLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

  let scene;
  let camera;
  let renderer;
  let orbitControls = null;
  let avatarInstances = [];
  let selectedAvatarInstance = null;
  let dragControls;
  let draggableObjects = [];
  let raycaster;
  let pointerVector;
  let selectionListenerBound = false;
  let transformListenerBound = false;
  let faceLandmarker;
  let poseLandmarker;
  let lastVideoTime = -1;

  const video = document.getElementById('webcam');
  const statusTxt = document.getElementById('status');
  const loadingEl = document.getElementById('loading');
  const myAvatarBadge = document.getElementById('my-avatar-badge');

  const DEFAULT_AVATAR = 'https://models.readyplayer.me/63b31e9ca06862590623a8e2.glb';
  const ROOM_ID_KEY = 'mealmateCurrentRoomId';
  const ROOM_PEOPLE_KEY = 'mealmateCurrentRoomPeople';
  const ROOM_LAYOUT_KEY = 'mealMate_room_layout';
  const ROOMS_KEY = 'mealmateRooms';
  const ADMIN_SETTINGS_KEY = 'mealmate-admin-settings-v1';
  const MY_AVATAR_NAME = 'Me';
  const ADMIN_ONLY_SINGLE_USER_MODE = true;
  const DEFAULT_ROOM_IMAGES = {
    modern: 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200',
    cozy: 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200',
    party: 'https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=1200',
    sunset: 'https://images.unsplash.com/photo-1498654896293-37aacf113fd9?w=1200',
    forest: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1200',
    city: 'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=1200',
  };
  const DRAG_LIMITS = {
    minX: -2.8,
    maxX: 2.8,
    minZ: -2.2,
    maxZ: 2.2,
  };
  const AVATAR_Y = -1.0;
  const PROXY_Y = -0.1;
  const HORIZONTAL_STEP = 0.18;
  const ZOOM_STEP = 0.08;
  const ROTATE_STEP = 0.12;
  const MIN_ZOOM = 0.65;
  const MAX_ZOOM = 1.6;
  const BACKGROUND_TARGET_WIDTH = 3840;

  const getSavedData = () => {
    try {
      const data = localStorage.getItem('mealMate_current');
      const parsed = data ? JSON.parse(data) : null;
      return parsed?.url ? parsed : { url: DEFAULT_AVATAR, bg: '', effect: 'none' };
    } catch (e) {
      console.error('데이터 로드 에러:', e);
      return { url: DEFAULT_AVATAR, bg: '', effect: 'none' };
    }
  };

  function resolveBackgroundFromRoomTheme(fallbackBg = '') {
    try {
      const params = new URLSearchParams(window.location.search || '');
      const bgThemeFromQuery = (params.get('bgTheme') || '').trim();
      const roomIdFromQuery = (params.get('roomId') || '').trim();
      const roomIdFromStorage = (localStorage.getItem(ROOM_ID_KEY) || '').trim();
      const targetRoomId = roomIdFromQuery || roomIdFromStorage;

      let targetTheme = bgThemeFromQuery;
      if (!targetTheme) {
        const rooms = JSON.parse(localStorage.getItem(ROOMS_KEY) || '[]');
        if (Array.isArray(rooms) && rooms.length) {
          const matched = targetRoomId
            ? rooms.find((room) => String(room?.id || '') === targetRoomId)
            : rooms[0];
          targetTheme = String(matched?.bgTheme || '').trim();
        }
      }

      if (!targetTheme) {
        return fallbackBg || '';
      }

      let settings = null;
      try {
        const settingsRaw = localStorage.getItem(ADMIN_SETTINGS_KEY);
        settings = settingsRaw ? JSON.parse(settingsRaw) : null;
      } catch {
        settings = null;
      }

      if (targetTheme === 'modern' && settings?.createRoomBgModern) return settings.createRoomBgModern;
      if (targetTheme === 'cozy' && settings?.createRoomBgCozy) return settings.createRoomBgCozy;
      if (targetTheme === 'party' && settings?.createRoomBgParty) return settings.createRoomBgParty;
      if (targetTheme === 'sunset' && settings?.createRoomBgSunset) return settings.createRoomBgSunset;
      if (targetTheme === 'forest' && settings?.createRoomBgForest) return settings.createRoomBgForest;
      if (targetTheme === 'city' && settings?.createRoomBgCity) return settings.createRoomBgCity;

      return DEFAULT_ROOM_IMAGES[targetTheme] || fallbackBg || DEFAULT_ROOM_IMAGES.modern;
    } catch {
      return fallbackBg || '';
    }
  }

  function resizeRenderer() {
    if (!renderer || !camera) return;
    const target = document.getElementById('canvas-container');
    const width = target?.clientWidth || window.innerWidth;
    const height = target?.clientHeight || window.innerHeight;
    renderer.setSize(width, height);
    camera.aspect = width / Math.max(height, 1);
    camera.updateProjectionMatrix();
  }

  function findBone(root, patterns) {
    let found = null;
    root.traverse((n) => {
      if (found || !n.isBone || !n.name) return;
      const lower = n.name.toLowerCase();
      if (patterns.some((pattern) => pattern.every((token) => lower.includes(token)))) {
        found = n;
      }
    });
    return found;
  }

  function createBoneMap(root) {
    return {
      RightUpperArm: findBone(root, [
      ['right', 'upper', 'arm'],
      ['right', 'arm'],
      ['mixamorig', 'rightarm'],
      ]),

      LeftUpperArm: findBone(root, [
      ['left', 'upper', 'arm'],
      ['left', 'arm'],
      ['mixamorig', 'leftarm'],
      ]),

      Head: findBone(root, [
      ['head'],
      ['neck'],
      ['mixamorig', 'head'],
      ]),
    };
  }

  function getParticipantCount() {
    const params = new URLSearchParams(window.location.search || '');
    const currentRoomId = params.get('roomId');
    if (currentRoomId) {
      localStorage.setItem(ROOM_ID_KEY, currentRoomId);
    }

    if (ADMIN_ONLY_SINGLE_USER_MODE) {
      localStorage.setItem(ROOM_PEOPLE_KEY, '1');
      return 1;
    }

    const fromQuery = Number(params.get('people'));

    if (Number.isFinite(fromQuery)) {
      localStorage.setItem(ROOM_PEOPLE_KEY, String(Math.min(8, Math.max(2, Math.trunc(fromQuery)))));
      return Math.min(8, Math.max(2, Math.trunc(fromQuery)));
    }

    const roomId = params.get('roomId');
    try {
      const rooms = JSON.parse(localStorage.getItem('mealmateRooms') || '[]');
      if (Array.isArray(rooms) && rooms.length) {
        const matched = roomId
          ? rooms.find((room) => String(room?.id || '') === roomId)
          : rooms[0];
        const value = Number(matched?.people || matched?.maxPeople);
        if (Number.isFinite(value)) {
          const normalized = Math.min(8, Math.max(2, Math.trunc(value)));
          localStorage.setItem(ROOM_PEOPLE_KEY, String(normalized));
          return normalized;
        }
      }
    } catch (error) {
      console.warn('참여 인원 로드 실패:', error);
    }

    const fromStored = Number(localStorage.getItem(ROOM_PEOPLE_KEY));
    if (Number.isFinite(fromStored)) {
      return Math.min(8, Math.max(2, Math.trunc(fromStored)));
    }

    return 2;
  }

  function getAvatarLayout(count) {
    const columns = count <= 3 ? count : count <= 6 ? 3 : 4;
    const rows = Math.ceil(count / columns);
    const spacingX = count <= 3 ? 1.35 : count <= 6 ? 1.2 : 1.0;
    const spacingZ = rows > 1 ? 1.45 : 0;
    const scale = count <= 3 ? 0.9 : count <= 6 ? 0.78 : 0.66;
    const positions = [];

    for (let i = 0; i < count; i += 1) {
      const row = Math.floor(i / columns);
      const col = i % columns;
      const xOffset = (col - (columns - 1) / 2) * spacingX;
      const zOffset = rows > 1 ? (row - (rows - 1) / 2) * spacingZ : 0;
      positions.push({ x: xOffset, y: -0.8, z: zOffset });
    }

    return { positions, scale };
  }

  function setCameraForParticipants(count) {
    if (!camera) return;
    if (count <= 3) {
      camera.position.set(0, 0.6, 3.6);
      return;
    }
    if (count <= 6) {
      camera.position.set(0, 0.6, 4.7);
      return;
    }
    camera.position.set(0, 0.6, 6.0);
  }

  function clearAvatars() {
    if (dragControls) {
      dragControls.deactivate();
      dragControls.dispose();
      dragControls = null;
    }
    draggableObjects = [];

    avatarInstances.forEach((instance) => {
      scene.remove(instance.root);
      if (instance.dragProxy) {
        scene.remove(instance.dragProxy);
      }
    });
    avatarInstances = [];
    selectedAvatarInstance = null;
    if (myAvatarBadge) {
      myAvatarBadge.style.display = 'none';
    }
  }

  function selectAvatar(instance) {
    const selectedName = instance?.root?.name || '';
    selectedAvatarInstance = avatarInstances.find((item) => item.root?.name === selectedName) || null;

    avatarInstances.forEach((item) => {
      item.isSelected = item === selectedAvatarInstance;
      if (!item.dragProxy || !item.dragProxy.material) return;
      const isMine = item.root?.name === MY_AVATAR_NAME;
      item.dragProxy.material.color.setHex(isMine ? 0x22c55e : 0xffffff);
      item.dragProxy.material.opacity = item.isSelected ? 0.2 : (isMine ? 0.08 : 0.01);
    });
  }

  function updateMyAvatarBadge() {
    if (!myAvatarBadge || !camera || !renderer) return;

    const myInstance = avatarInstances.find((instance) => instance.root?.name === MY_AVATAR_NAME);
    if (!myInstance?.root) {
      myAvatarBadge.style.display = 'none';
      return;
    }

    const targetPos = myInstance.root.position.clone();
    const sideOffset = 0.45 * (myInstance.zoom || 1);
    const footOffsetY = -0.05;
    targetPos.x += sideOffset;
    targetPos.y += footOffsetY;
    targetPos.project(camera);

    const isBehindCamera = targetPos.z > 1;
    if (isBehindCamera) {
      myAvatarBadge.style.display = 'none';
      return;
    }

    const canvasRect = renderer.domElement.getBoundingClientRect();
    const x = (targetPos.x * 0.5 + 0.5) * canvasRect.width;
    const y = (-targetPos.y * 0.5 + 0.5) * canvasRect.height;

    myAvatarBadge.style.display = 'block';
    myAvatarBadge.style.left = `${x}px`;
    myAvatarBadge.style.top = `${y}px`;
  }

  function handleAvatarSelection(event) {
    if (!renderer || !camera || !avatarInstances.length || !raycaster || !pointerVector) return;
    if (dragControls && dragControls.dragging) return;

    const rect = renderer.domElement.getBoundingClientRect();
    pointerVector.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    pointerVector.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    const avatarRoots = avatarInstances.map((instance) => instance.root).filter(Boolean);
    raycaster.setFromCamera(pointerVector, camera);
    const intersects = raycaster.intersectObjects(avatarRoots, true);
    if (!intersects.length) return;

    const instance = findAvatarInstanceFromHit(intersects[0].object);
    if (!instance) return;
    if (instance.root?.name !== MY_AVATAR_NAME) return;

    selectAvatar(instance);
    enableAvatarDragging();
  }

  function findAvatarInstanceFromHit(object) {
    if (!object) return null;
    let node = object;

    while (node) {
      const found = avatarInstances.find((instance) => instance.root === node);
      if (found) return found;
      node = node.parent || null;
    }

    return null;
  }

  function bindAvatarSelectionListener() {
    if (!renderer || selectionListenerBound) return;
    raycaster = new THREE.Raycaster();
    pointerVector = new THREE.Vector2();
    renderer.domElement.addEventListener('pointerdown', handleAvatarSelection);
    selectionListenerBound = true;
  }

  function syncProxyWithRoot(instance) {
    if (!instance?.dragProxy || !instance?.root) return;
    instance.dragProxy.position.x = instance.root.position.x;
    instance.dragProxy.position.z = instance.root.position.z;
    instance.dragProxy.position.y = PROXY_Y;
  }

  function getSafeDragLimits() {
    const aspect = camera?.aspect || 0.55;
    const safeHalfX = Math.min(DRAG_LIMITS.maxX, Math.max(1.1, aspect * 2.2));
    const safeMinZ = Math.max(DRAG_LIMITS.minZ, -1.6);
    const safeMaxZ = Math.min(DRAG_LIMITS.maxZ, 1.4);

    return {
      minX: -safeHalfX,
      maxX: safeHalfX,
      minZ: safeMinZ,
      maxZ: safeMaxZ,
    };
  }

  function clampRootToSafeArea(root) {
    if (!root) return;
    const limits = getSafeDragLimits();
    root.position.x = THREE.MathUtils.clamp(root.position.x, limits.minX, limits.maxX);
    root.position.z = THREE.MathUtils.clamp(root.position.z, limits.minZ, limits.maxZ);
    root.position.y = AVATAR_Y;
  }

  function clampProxyToSafeArea(proxy) {
    if (!proxy) return;
    const limits = getSafeDragLimits();
    proxy.position.x = THREE.MathUtils.clamp(proxy.position.x, limits.minX, limits.maxX);
    proxy.position.z = THREE.MathUtils.clamp(proxy.position.z, limits.minZ, limits.maxZ);
    proxy.position.y = PROXY_Y;
  }

  function applyAvatarScale(instance) {
    if (!instance?.root) return;
    const signedX = instance.mirrored ? -instance.baseScale * instance.zoom : instance.baseScale * instance.zoom;
    const signedY = instance.baseScale * instance.zoom;
    const signedZ = instance.baseScale * instance.zoom;
    instance.root.scale.set(signedX, signedY, signedZ);
  }

  function moveSelectedAvatarHorizontal(step) {
    if (!selectedAvatarInstance?.root) return;
    if (selectedAvatarInstance.root.name !== MY_AVATAR_NAME) return;
    selectedAvatarInstance.root.position.x += step;
    clampRootToSafeArea(selectedAvatarInstance.root);
    syncProxyWithRoot(selectedAvatarInstance);
    saveAvatarPositions();
  }

  function toggleSelectedAvatarMirror() {
    if (!selectedAvatarInstance?.root) return;
    if (selectedAvatarInstance.root.name !== MY_AVATAR_NAME) return;
    selectedAvatarInstance.mirrored = !selectedAvatarInstance.mirrored;
    applyAvatarScale(selectedAvatarInstance);
    saveAvatarPositions();
  }

  function zoomSelectedAvatar(delta) {
    if (!selectedAvatarInstance?.root) return;
    if (selectedAvatarInstance.root.name !== MY_AVATAR_NAME) return;
    const nextZoom = THREE.MathUtils.clamp((selectedAvatarInstance.zoom || 1) + delta, MIN_ZOOM, MAX_ZOOM);
    selectedAvatarInstance.zoom = nextZoom;
    applyAvatarScale(selectedAvatarInstance);
    saveAvatarPositions();
  }

  function rotateSelectedAvatar(axis, delta) {
    if (!selectedAvatarInstance?.root) return;
    if (selectedAvatarInstance.root.name !== MY_AVATAR_NAME) return;
    selectedAvatarInstance.root.rotation[axis] += delta;
    saveAvatarPositions();
  }

  function bindTransformInputListeners() {
    if (!renderer || transformListenerBound) return;

    window.addEventListener('keydown', (event) => {
      const tag = (event.target?.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;

      if (event.code === 'ArrowLeft') {
        event.preventDefault();
        moveSelectedAvatarHorizontal(-HORIZONTAL_STEP);
      } else if (event.code === 'ArrowRight') {
        event.preventDefault();
        moveSelectedAvatarHorizontal(HORIZONTAL_STEP);
      } else if (event.code === 'KeyQ') {
        event.preventDefault();
        rotateSelectedAvatar('y', -ROTATE_STEP);
      } else if (event.code === 'KeyE') {
        event.preventDefault();
        rotateSelectedAvatar('y', ROTATE_STEP);
      } else if (event.code === 'KeyW') {
        event.preventDefault();
        rotateSelectedAvatar('x', -ROTATE_STEP);
      } else if (event.code === 'KeyS') {
        event.preventDefault();
        rotateSelectedAvatar('x', ROTATE_STEP);
      } else if (event.code === 'KeyA') {
        event.preventDefault();
        rotateSelectedAvatar('z', -ROTATE_STEP);
      } else if (event.code === 'KeyD') {
        event.preventDefault();
        rotateSelectedAvatar('z', ROTATE_STEP);
      } else if (event.code === 'KeyM') {
        event.preventDefault();
        toggleSelectedAvatarMirror();
      } else if (event.code === 'Equal' || event.code === 'NumpadAdd') {
        event.preventDefault();
        zoomSelectedAvatar(ZOOM_STEP);
      } else if (event.code === 'Minus' || event.code === 'NumpadSubtract') {
        event.preventDefault();
        zoomSelectedAvatar(-ZOOM_STEP);
      }
    });

    renderer.domElement.addEventListener('wheel', (event) => {
      if (!selectedAvatarInstance) return;
      if (!event.ctrlKey) return;

      event.preventDefault();
      zoomSelectedAvatar(event.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP);
    }, { passive: false });

    transformListenerBound = true;
  }

  function getSavedAvatarPositions() {
    try {
      const raw = localStorage.getItem(ROOM_LAYOUT_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }

  function applySavedAvatarPositions() {
    const savedPositions = getSavedAvatarPositions();
    if (!savedPositions.length) return;

    const byId = new Map(savedPositions.map((item) => [String(item?.id || ''), item?.pos || {}]));

    avatarInstances.forEach((instance) => {
      const key = String(instance.root.name || '');
      const saved = byId.get(key);
      if (!saved) return;

      const nextX = Number(saved.x);
      const nextZ = Number(saved.z);
      if (Number.isFinite(nextX)) {
        instance.root.position.x = nextX;
      }
      if (Number.isFinite(nextZ)) {
        instance.root.position.z = nextZ;
      }

      const zoom = Number(saved.zoom);
      instance.zoom = Number.isFinite(zoom) ? THREE.MathUtils.clamp(zoom, MIN_ZOOM, MAX_ZOOM) : (instance.zoom || 1);
      instance.mirrored = !!saved.mirrored;
      applyAvatarScale(instance);

      const rx = Number(saved.rotX);
      const ry = Number(saved.rotY);
      const rz = Number(saved.rotZ);
      instance.root.rotation.x = Number.isFinite(rx) ? rx : 0;
      instance.root.rotation.y = Number.isFinite(ry) ? ry : 0;
      instance.root.rotation.z = Number.isFinite(rz) ? rz : 0;

      clampRootToSafeArea(instance.root);
      syncProxyWithRoot(instance);
    });
  }

  function saveAvatarPositions() {
    const positions = avatarInstances.map((instance) => ({
      id: instance.root.name,
      pos: {
        x: instance.root.position.x,
        z: instance.root.position.z,
      },
      zoom: instance.zoom || 1,
      mirrored: !!instance.mirrored,
      rotX: instance.root.rotation.x,
      rotY: instance.root.rotation.y,
      rotZ: instance.root.rotation.z,
    }));
    localStorage.setItem(ROOM_LAYOUT_KEY, JSON.stringify(positions));
  }

  function enableAvatarDragging() {
    if (!camera || !renderer || !avatarInstances.length) return;
    if (!THREE.DragControls) return;

    if (dragControls) {
      dragControls.deactivate();
      dragControls.dispose();
      dragControls = null;
    }

    const meInstance = avatarInstances.find((instance) => instance.root?.name === MY_AVATAR_NAME);
    if (!meInstance) return;
    selectedAvatarInstance = meInstance;

    draggableObjects = meInstance.dragProxy ? [meInstance.dragProxy] : [];
    if (!draggableObjects.length) return;

    dragControls = new THREE.DragControls(draggableObjects, camera, renderer.domElement);

    dragControls.addEventListener('dragstart', (event) => {
      const targetInstance = event.object.userData.avatarInstance;
      if (!targetInstance || targetInstance !== selectedAvatarInstance) return;
      if (targetInstance.root?.name !== MY_AVATAR_NAME) return;
      const targetRoot = targetInstance?.root;
      if (!targetRoot) return;

      if (orbitControls) orbitControls.enabled = false;
      event.object.userData.dragLockY = event.object.position.y;

      targetRoot.traverse((node) => {
        if (!node.isMesh || !node.material) return;
        const materials = Array.isArray(node.material) ? node.material : [node.material];
        materials.forEach((material) => {
          if (!material) return;
          const prevOpacity = typeof material.opacity === 'number' ? material.opacity : 1.0;
          material.userData = material.userData || {};
          material.userData.originalOpacity = prevOpacity;
          material.userData.originalTransparent = !!material.transparent;
          material.transparent = true;
          material.opacity = 0.6;
        });
      });

      console.log('아바타 이동 시작:', targetRoot.name || 'Avatar');
    });

    dragControls.addEventListener('drag', (event) => {
      const targetInstance = event.object.userData.avatarInstance;
      if (!targetInstance || targetInstance !== selectedAvatarInstance) return;
      if (targetInstance.root?.name !== MY_AVATAR_NAME) return;

      clampProxyToSafeArea(event.object);

      if (!targetInstance?.root) return;
      targetInstance.root.position.x = event.object.position.x;
      targetInstance.root.position.z = event.object.position.z;
      clampRootToSafeArea(targetInstance.root);
    });

    dragControls.addEventListener('dragend', (event) => {
      const targetInstance = event.object.userData.avatarInstance;
      if (!targetInstance || targetInstance !== selectedAvatarInstance) return;
      if (targetInstance.root?.name !== MY_AVATAR_NAME) return;
      const targetRoot = targetInstance?.root;
      if (!targetRoot) return;

      if (orbitControls) orbitControls.enabled = true;
      clampProxyToSafeArea(event.object);
      delete event.object.userData.dragLockY;

      targetRoot.position.x = event.object.position.x;
      targetRoot.position.z = event.object.position.z;
      clampRootToSafeArea(targetRoot);
      syncProxyWithRoot(targetInstance);

      targetRoot.traverse((node) => {
        if (!node.isMesh || !node.material) return;
        const materials = Array.isArray(node.material) ? node.material : [node.material];
        materials.forEach((material) => {
          if (!material) return;
          const savedOpacity = material.userData?.originalOpacity;
          const savedTransparent = material.userData?.originalTransparent;
          material.opacity = typeof savedOpacity === 'number' ? savedOpacity : 1.0;
          material.transparent = typeof savedTransparent === 'boolean' ? savedTransparent : false;
        });
      });

      saveAvatarPositions();
      console.log(`${targetRoot.name || 'Avatar'} 이동 완료:`, targetRoot.position);
    });
  }

  function createDragProxy(name, x, z) {
    const geometry = new THREE.BoxGeometry(0.9, 1.8, 0.9);
    const material = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.01,
      depthWrite: false,
    });
    const proxy = new THREE.Mesh(geometry, material);
    proxy.name = `${name}_drag_proxy`;
    proxy.position.set(x, PROXY_Y, z);
    scene.add(proxy);
    return proxy;
  }

  function loadAvatars(url, count) {
    return new Promise((resolve, reject) => {
      const loader = new THREE.GLTFLoader();
      loader.load(
        url,
        (gltf) => {
          clearAvatars();

          const { positions, scale } = getAvatarLayout(count);
          const source = gltf.scene;

          positions.forEach((position) => {
            const root = THREE.SkeletonUtils.clone(source);
            const index = avatarInstances.length;
            root.name = index === 0 ? 'Me' : `Friend_${index}`;
            root.position.set(position.x, position.y, position.z);
            root.scale.set(scale, scale, scale);
            scene.add(root);
            const dragProxy = createDragProxy(root.name, position.x, position.z);
            const instance = { root, bones: createBoneMap(root), dragProxy, isSelected: false, baseScale: scale, zoom: 1, mirrored: false };
            dragProxy.userData.avatarInstance = instance;
            avatarInstances.push(instance);
          });

          applySavedAvatarPositions();
          const myInstance = avatarInstances.find((instance) => instance.root?.name === MY_AVATAR_NAME) || null;
          selectAvatar(myInstance);
          enableAvatarDragging();
          setCameraForParticipants(count);
          resolve();
        },
        undefined,
        (error) => reject(error)
      );
    });
  }

  function applyBackground(bgUrl) {
    if (!bgUrl) return;
    const highQualityUrl = toHighQualityBackgroundUrl(bgUrl);
    new THREE.TextureLoader().load(highQualityUrl, (tex) => {
      tex.encoding = THREE.sRGBEncoding;
      tex.generateMipmaps = true;
      tex.minFilter = THREE.LinearMipmapLinearFilter;
      tex.magFilter = THREE.LinearFilter;
      if (renderer?.capabilities) {
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      }
      tex.needsUpdate = true;
      scene.background = tex;
    });
  }

  function toHighQualityBackgroundUrl(url) {
    try {
      const parsed = new URL(url);
      const host = parsed.hostname.toLowerCase();

      if (host.includes('unsplash.com')) {
        parsed.searchParams.set('w', String(BACKGROUND_TARGET_WIDTH));
        parsed.searchParams.set('q', '100');
        parsed.searchParams.set('fit', 'max');
        parsed.searchParams.set('auto', 'format');
        parsed.searchParams.set('dpr', '2');
        return parsed.toString();
      }

      return url;
    } catch {
      return url;
    }
  }

  function applyEffect(effect) {
    if (!renderer) return;
    renderer.domElement.style.filter = effect === 'blur' ? 'blur(10px)' : 'none';
  }

  async function startEngine() {
    try {
      const savedData = getSavedData();
      statusTxt.innerText = '엔진 초기화 중...';

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0.6, 3.5);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio || 1);
      renderer.outputEncoding = THREE.sRGBEncoding;
      resizeRenderer();
      document.getElementById('canvas-container').appendChild(renderer.domElement);
      bindAvatarSelectionListener();
      bindTransformInputListeners();

      if (THREE.OrbitControls) {
        orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.08;
        orbitControls.enablePan = true;
        orbitControls.minDistance = 2.5;
        orbitControls.maxDistance = 9.0;
        orbitControls.maxPolarAngle = Math.PI * 0.48;
      }

      scene.add(new THREE.AmbientLight(0xffffff, 1.2));
      const light = new THREE.DirectionalLight(0xffffff, 0.6);
      light.position.set(1, 1, 2);
      scene.add(light);

      const resolvedRoomBg = resolveBackgroundFromRoomTheme(savedData.bg);
      applyBackground(resolvedRoomBg);
      applyEffect(savedData.effect || 'none');

      const participantCount = getParticipantCount();

      statusTxt.innerText = '모션 인식 데이터 로드 중...';
      const fileset = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');

      faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'GPU',
        },
        outputFaceBlendshapes: true,
        runningMode: 'VIDEO',
        numFaces: 1,
      });

      poseLandmarker = await PoseLandmarker.createFromOptions(fileset, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO',
        numPoses: 1,
      });

      statusTxt.innerText = '카메라 연결 중...';
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
      await video.play();

      try {
        await loadAvatars(savedData.url || DEFAULT_AVATAR, participantCount);
      } catch {
        await loadAvatars(DEFAULT_AVATAR, participantCount);
      }

      loadingEl.style.display = 'none';
      animate();
    } catch (e) {
      statusTxt.innerText = '에러: 카메라 권한/네트워크를 확인해주세요.';
      console.error(e);
    }
  }

  function animate() {
    requestAnimationFrame(animate);

    if (orbitControls) {
      orbitControls.update();
    }

    const meInstance = avatarInstances.find((instance) => instance.root?.name === MY_AVATAR_NAME);
    if (meInstance?.root) {
      clampRootToSafeArea(meInstance.root);
      syncProxyWithRoot(meInstance);
    }

    if (avatarInstances.length && video.readyState >= 2 && faceLandmarker && poseLandmarker) {
      const now = performance.now();
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;

        const faceRes = faceLandmarker.detectForVideo(video, now);
        const poseRes = poseLandmarker.detectForVideo(video, now);

        if (faceRes.faceBlendshapes?.[0]) {
          const shapes = faceRes.faceBlendshapes[0].categories;
          avatarInstances.forEach((instance) => {
            instance.root.traverse((node) => {
              if (!node.isMesh || !node.morphTargetDictionary || !node.morphTargetInfluences) return;
              shapes.forEach((shape) => {
                const idx = node.morphTargetDictionary[shape.categoryName];
                if (idx !== undefined) {
                  node.morphTargetInfluences[idx] = THREE.MathUtils.lerp(node.morphTargetInfluences[idx], shape.score, 0.38);
                }
              });
            });
          });
        }

        if (poseRes.landmarks?.[0]) {
          const p = poseRes.landmarks[0];
          const lerp = THREE.MathUtils.lerp;

          avatarInstances.forEach((instance) => {
            const avatarBones = instance.bones;
            if (avatarBones.RightUpperArm && p[12] && p[14]) {
              const angle = Math.atan2(p[14].y - p[12].y, p[14].x - p[12].x);
              avatarBones.RightUpperArm.rotation.z = lerp(avatarBones.RightUpperArm.rotation.z, -angle - 1.5, 0.2);
            }

            if (avatarBones.LeftUpperArm && p[11] && p[13]) {
              const angle = Math.atan2(p[13].y - p[11].y, p[13].x - p[11].x);
              avatarBones.LeftUpperArm.rotation.z = lerp(avatarBones.LeftUpperArm.rotation.z, -angle + 1.5, 0.2);
            }

            if (avatarBones.Head && p[0]) {
              avatarBones.Head.rotation.y = lerp(avatarBones.Head.rotation.y, (p[0].x - 0.5) * -0.8, 0.1);
              avatarBones.Head.rotation.x = lerp(avatarBones.Head.rotation.x, (p[0].y - 0.5) * 0.5, 0.1);
            }
          });
        }
      }
    }

    if (renderer && scene && camera) {
      updateMyAvatarBadge();
      renderer.render(scene, camera);
    }
  }

  window.addEventListener('resize', resizeRenderer);
  window.addEventListener('load', startEngine);
</script>
</body>
